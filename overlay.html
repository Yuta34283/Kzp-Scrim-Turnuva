<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial;
}

.overlay {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 360px;
    background: rgba(15,15,15,0.95);
    border-radius: 10px;
    overflow: hidden;
    color: white;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.header {
    background: rgba(30,30,30,0.95);
    padding: 10px;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 1px;
}

.row {
    display: grid;
    grid-template-columns: 30px 1fr 80px 60px 60px;
    padding: 6px 8px;
    font-size: 12px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.row:nth-child(odd) {
    background: rgba(255,255,255,0.02);
}

.rank {
    text-align: center;
    color: #aaa;
}

.team {
    display: flex;
    align-items: center;
    gap: 6px;
}

.tag {
    font-weight: bold;
}

.alive {
    color: #4cff7a;
    letter-spacing: 1px;
    font-size: 11px;
}

.pts, .kills {
    text-align: center;
    color: #ddd;
}

.bar {
    color: #4cff7a;
    letter-spacing: 2px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="header">KZP PUBG LEADERBOARD</div>
    <div id="table"></div>
</div>

<script>

let teams = [
    {rank:1, tag:"BRA", alive:3, pts:63, kills:2},
    {rank:2, tag:"ARG", alive:0, pts:44, kills:0},
    {rank:3, tag:"UKR", alive:1, pts:42, kills:3},
    {rank:4, tag:"VIE", alive:0, pts:38, kills:2},
    {rank:5, tag:"DEN", alive:4, pts:35, kills:0},
    {rank:6, tag:"THA", alive:0, pts:34, kills:0},
    {rank:7, tag:"KOR", alive:1, pts:34, kills:1},
    {rank:8, tag:"CHN", alive:0, pts:30, kills:4},
    {rank:9, tag:"NEU", alive:0, pts:29, kills:0},
    {rank:10, tag:"USA", alive:4, pts:26, kills:3},
    {rank:11, tag:"GER", alive:0, pts:23, kills:0}
];

function bars(n){
    return "IIII".split("").map((x,i)=> i < n ? "I" : " ").join("");
}

function render(){
    const table = document.getElementById("table");
    table.innerHTML = "";

    teams.forEach(t => {
        table.innerHTML += `
        <div class="row">

            <div class="rank">${t.rank}</div>

            <div class="team">
                <div class="tag">${t.tag}</div>
            </div>

            <div class="alive bar">${bars(t.alive)}</div>

            <div class="pts">${t.pts}</div>

            <div class="kills">${t.kills}</div>

        </div>`;
    });
}

render();

</script>

</body>
</html>
