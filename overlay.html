<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
    /* OBS'de şeffaflığı zorlamak için temel yapı */
    body { margin: 0; padding: 0; background-color: rgba(0, 0, 0, 0); overflow: hidden; font-family: sans-serif; }
    
    .overlay { 
        width: 360px; 
        background: rgba(15, 15, 15, 0.9); /* Arka planı biraz belirginleştiriyoruz */
        border-left: 4px solid #4cff7a;
        color: white; 
        box-shadow: 5px 0 15px rgba(0,0,0,0.5); 
    }
    .header { 
        padding: 12px; background: rgba(30, 30, 30, 0.95); 
        font-weight: bold; text-align: center; letter-spacing: 2px;
        border-bottom: 1px solid #4cff7a; color: #4cff7a;
    }
    .row { 
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .team-info { display: flex; align-items: center; gap: 10px; }
    .rank { color: #4cff7a; font-weight: bold; width: 20px; }
    .tag { font-weight: bold; font-size: 15px; }
    .stats { font-size: 12px; color: #aaa; }
    .kills { color: #fff; font-weight: bold; background: #222; padding: 2px 8px; border-radius: 4px; }
</style>
</head>
<body>

<div class="overlay">
    <div class="header">KZP TURNUVA</div>
    <div id="table"></div>
</div>

<script>
function render(){
    // Buraya doğrudan takımları yazabilirsin (Veya bir JSON dosyasından çekebilirsin)
    const teams = [
        { tag: "TEAM A", alive: 4, kills: 12 },
        { tag: "KZP", alive: 2, kills: 33 },
        { tag: "XLOG", alive: 0, kills: 5 },
        { tag: "RED", alive: 1, kills: 3 }
    ];

    teams.sort((a, b) => b.kills - a.kills);
    
    const table = document.getElementById("table");
    table.innerHTML = teams.map((t, i) => `
        <div class="row">
            <div class="team-info">
                <div class="rank">${i + 1}</div>
                <div class="tag">${t.tag}</div>
            </div>
            <div>
                <span class="stats">${t.alive} alive</span>
                <span class="kills">${t.kills} kill</span>
            </div>
        </div>`).join("");
}

setInterval(render, 1000);
render();
</script>

</body>
</html>
