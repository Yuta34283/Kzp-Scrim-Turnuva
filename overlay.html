<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Leaderboard Overlay</title>
<style>
    body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    /* SAĞ PANEL */
    .panel {
        position: absolute;
        right: 40px;
        top: 80px;
        width: 320px;
        background: rgba(10, 10, 20, 0.75);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .title {
        color: white;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
        text-align: center;
        letter-spacing: 1px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        margin-bottom: 6px;
        border-radius: 8px;
        background: rgba(255,255,255,0.05);
        color: white;
        font-size: 14px;
    }

    .row:nth-child(2) { border-left: 4px solid gold; }
    .row:nth-child(3) { border-left: 4px solid silver; }
    .row:nth-child(4) { border-left: 4px solid #cd7f32; }

    .rank {
        width: 25px;
        opacity: 0.8;
    }

    .team {
        flex: 1;
        padding-left: 6px;
    }

    .points {
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="panel">
    <div class="title">LEADERBOARD</div>

    <div class="row"><div class="rank">1</div><div class="team">Team Alpha</div><div class="points">120</div></div>
    <div class="row"><div class="rank">2</div><div class="team">Team Beta</div><div class="points">98</div></div>
    <div class="row"><div class="rank">3</div><div class="team">Team Gamma</div><div class="points">87</div></div>
    <div class="row"><div class="rank">4</div><div class="team">Team Delta</div><div class="points">75</div></div>
    <div class="row"><div class="rank">5</div><div class="team">Team Sigma</div><div class="points">61</div></div>
</div>

</body>
</html>
