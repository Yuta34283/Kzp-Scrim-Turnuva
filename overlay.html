<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

/* ✅ SOL ÜSTE SABİT PANEL */
.overlay {
    position: fixed;
    top: 20px;
    left: 20px;   /* <-- SOLA ALIR */
    width: 320px;
    background: rgba(15, 15, 15, 0.85);
    color: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.header {
    display: flex;
    background: rgba(30,30,30,0.95);
    padding: 6px 10px;
    font-size: 12px;
    font-weight: bold;
    color: #aaa;
}

.row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.rank { width: 20px; color: #ccc; }

.team {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
}

.team img {
    width: 18px;
    height: 12px;
    object-fit: cover;
    border-radius: 2px;
}

.pts, .kills { width: 30px; text-align: center; }
.alive { width: 50px; text-align: center; letter-spacing: 1px; }
</style>
</head>

<body>

<div class="overlay" id="overlay">

    <div class="header">
        <div style="width:20px;">#</div>
        <div class="team">TEAM</div>
        <div class="alive">ALIVE</div>
        <div class="pts">PTS</div>
        <div class="kills">K</div>
    </div>

    <div id="rows"></div>

</div>

<script>
// ✅ ÖRNEK DİNAMİK DATA
let data = [
    {rank:1, code:"ar", name:"ARG", alive:4, pts:4, kills:4},
    {rank:2, code:"ph", name:"PHI", alive:2, pts:4, kills:4},
    {rank:3, code:"dk", name:"DEN", alive:4, pts:3, kills:3},
    {rank:4, code:"us", name:"USA", alive:4, pts:2, kills:2},
    {rank:5, code:"id", name:"INA", alive:4, pts:1, kills:1},
];

// ✅ UI ÇİZ
function render() {
    const container = document.getElementById("rows");
    container.innerHTML = "";

    data.forEach(t => {
        container.innerHTML += `
        <div class="row">
            <div class="rank">${t.rank}</div>
            <div class="team">
                <img src="https://flagcdn.com/${t.code}.svg">
                ${t.name}
            </div>
            <div class="alive">${"▮".repeat(t.alive)}</div>
            <div class="pts">${t.pts}</div>
            <div class="kills">${t.kills}</div>
        </div>
        `;
    });
}

// ilk çizim
render();

// ✅ 3 saniyede bir güncelle (örnek refresh)
setInterval(() => {
    // burada gerçek API / oyun verisi bağlanır

    data = data.map(t => ({
        ...t,
        kills: t.kills + (Math.random() > 0.7 ? 1 : 0)
    }));

    render();
}, 3000);

</script>

</body>
</html>
