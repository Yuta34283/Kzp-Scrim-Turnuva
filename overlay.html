<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slot List Overlay</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

.overlay {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 340px;
    background: rgba(10,10,10,0.92);
    color: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
}

.header {
    padding: 10px;
    background: rgba(25,25,25,0.95);
    font-weight: bold;
    font-size: 13px;
    text-align: center;
    letter-spacing: 1px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 10px;
}

.slot {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.slot.empty {
    color: #666;
}

.top {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #aaa;
}

.team {
    font-weight: bold;
    font-size: 12px;
}

.alive {
    font-size: 11px;
    color: #4cff7a;
}

.buttons {
    display: flex;
    gap: 5px;
}

button {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
    padding: 4px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
}

button:hover {
    background: rgba(255,255,255,0.18);
}
</style>
</head>

<body>

<div class="overlay">
    <div class="header">KZP PUBG TURNUVA SLOT LİSTESİ</div>
    <div class="grid" id="grid"></div>
</div>

<script>

let slots = [
    {id:1, team:"BOS", alive:0},
    {id:2, team:"BOS", alive:0},
    {id:3, team:"KZP E SPORTS", alive:4},
    {id:4, team:"KARA E SPORTS", alive:4},
    {id:5, team:"ECEL E SPORTS", alive:4},
    {id:6, team:"EMK E SPORTS", alive:4},
    {id:7, team:"PNT E SPORTS", alive:4},
    {id:8, team:"57 ESPORT", alive:4},
    {id:9, team:"KZP ACADEMY", alive:4},
    {id:10, team:"SVS E SPORTS", alive:4},
    {id:11, team:"FLEX E SPORTS", alive:4},
    {id:12, team:"PNT ACADEMY", alive:4},
    {id:13, team:"SFP E SPORTS", alive:4},
    {id:14, team:"HD E SPORTS", alive:4},
    {id:15, team:"GOK TEAM", alive:4},
    {id:16, team:"ECEL ACADEMY", alive:4},
    {id:17, team:"KZP AZE", alive:4},
    {id:18, team:"PNT PRIME", alive:4}
];

function changeAlive(id, delta) {
    const slot = slots.find(s => s.id === id);
    if (!slot || slot.team === "BOS") return;

    slot.alive += delta;

    if (slot.alive < 0) slot.alive = 0;
    if (slot.alive > 4) slot.alive = 4;

    render();
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    slots.forEach(s => {
        grid.innerHTML += `
        <div class="slot ${s.team === "BOS" ? "empty" : ""}">
            
            <div class="top">
                <span>SLOT ${s.id}</span>
                <span class="alive">ALIVE: ${s.team === "BOS" ? 0 : s.alive}</span>
            </div>

            <div class="team">${s.team}</div>

            <div class="buttons">
                <button onclick="changeAlive(${s.id}, -1)">-1</button>
                <button onclick="changeAlive(${s.id}, 1)">+1</button>
            </div>

        </div>`;
    });
}

render();

</script>

</body>
</html>
