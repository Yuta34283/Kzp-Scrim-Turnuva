<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background-color: rgba(0, 0, 0, 0); font-family: sans-serif; color: white; }
        .overlay { width: 450px; background: rgba(15, 15, 15, 0.95); border: 2px solid #4cff7a; border-radius: 8px; overflow: hidden; }
        .header { background: #1a1a1a; padding: 10px; text-align: center; font-weight: bold; color: #4cff7a; border-bottom: 2px solid #4cff7a; }
        .row { display: grid; grid-template-columns: 140px 60px 60px 80px; padding: 6px 10px; border-bottom: 1px solid #333; align-items: center; font-size: 13px; }
        .head-row { font-weight: bold; background: #222; font-size: 12px; }
        input { width: 45px; background: #000; border: 1px solid #444; color: #fff; text-align: center; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="header">KZP TURNUVA PUAN TABLOSU</div>
    <div class="row head-row">
        <div>TAKIM</div>
        <div>SIRALAMA</div>
        <div>KILL</div>
        <div>TOPLAM</div>
    </div>
    <div id="table"></div>
</div>

<script>
const teams = [
    "KZP E SPORTS", "KARA E SPORTS", "ECEL E SPORTS", "EMK SPORTS", "PNT E SPORTS", 
    "57 TEAM E SPORTS", "BCS E SPORTS", "SVS E SPORTS", "FLEX E SPORTS", "PNT ACADEMY", 
    "SFP E SPORTS", "PNT PRIME", "GOK TEAM", "ECEL ACADEMY", "KZP AZE.", "HD E SPORTS"
];

// Takım verilerini oluştur
let teamData = teams.map(name => ({ name, pos: 0, kills: 0 }));

function update() {
    teamData.sort((a, b) => (b.pos + b.kills) - (a.pos + a.kills));
    const container = document.getElementById("table");
    container.innerHTML = teamData.map((t, i) => `
        <div class="row">
            <div>${t.name}</div>
            <div><input type="number" value="${t.pos}" onchange="setVal('${t.name}', 'pos', this.value)"></div>
            <div><input type="number" value="${t.kills}" onchange="setVal('${t.name}', 'kills', this.value)"></div>
            <div style="font-weight:bold; color:#4cff7a;">${parseInt(t.pos) + parseInt(t.kills)}</div>
        </div>
    `).join("");
}

function setVal(name, key, val) {
    let team = teamData.find(t => t.name === name);
    team[key] = parseInt(val) || 0;
    update();
}

update();
</script>

</body>
</html>
