<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
    body {
        margin: 0;
        background: transparent;
        font-family: Arial, sans-serif;
    }

    .overlay {
        width: 320px;
        background: rgba(15, 15, 15, 0.85);
        color: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .header {
        display: flex;
        background: rgba(30,30,30,0.95);
        padding: 6px 10px;
        font-size: 12px;
        font-weight: bold;
        color: #aaa;
    }

    .row {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        font-size: 13px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .rank {
        width: 20px;
        color: #ccc;
    }

    .team {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .team img {
        width: 18px;
        height: 12px;
        object-fit: cover;
        border-radius: 2px;
    }

    .bars {
        width: 60px;
        display: flex;
        gap: 2px;
    }

    .bar {
        width: 3px;
        height: 10px;
        background: #444;
    }

    .bar.on {
        background: #ffffff;
    }

    .pts, .kills {
        width: 30px;
        text-align: center;
    }

    .alive {
        width: 50px;
        text-align: center;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="overlay">

    <div class="header">
        <div style="width:20px;">#</div>
        <div class="team">TEAM</div>
        <div class="alive">ALIVE</div>
        <div class="pts">PTS</div>
        <div class="kills">K</div>
    </div>

    <div class="row">
        <div class="rank">1</div>
        <div class="team"><img src="https://flagcdn.com/ar.svg"> ARG</div>
        <div class="alive">▮▮▮▮</div>
        <div class="pts">4</div>
        <div class="kills">4</div>
    </div>

    <div class="row">
        <div class="rank">2</div>
        <div class="team"><img src="https://flagcdn.com/ph.svg"> PHI</div>
        <div class="alive">▮▮</div>
        <div class="pts">4</div>
        <div class="kills">4</div>
    </div>

    <div class="row">
        <div class="rank">3</div>
        <div class="team"><img src="https://flagcdn.com/dk.svg"> DEN</div>
        <div class="alive">▮▮▮▮</div>
        <div class="pts">3</div>
        <div class="kills">3</div>
    </div>

    <div class="row">
        <div class="rank">4</div>
        <div class="team"><img src="https://flagcdn.com/us.svg"> USA</div>
        <div class="alive">▮▮▮▮</div>
        <div class="pts">2</div>
        <div class="kills">2</div>
    </div>

    <div class="row">
        <div class="rank">5</div>
        <div class="team"><img src="https://flagcdn.com/id.svg"> INA</div>
        <div class="alive">▮▮▮▮</div>
        <div class="pts">1</div>
        <div class="kills">1</div>
    </div>

</div>

</body>
</html>
