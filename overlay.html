<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Esports Overlay</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

/* ✅ SAĞA SABİT PANEL */
.overlay {
    position: fixed;
    top: 20px;
    right: 20px;   /* <-- SAĞ TARAF */
    width: 260px;
    background: rgba(10,10,10,0.88);
    color: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(0,0,0,0.6);
}

.header {
    display: flex;
    padding: 8px 10px;
    font-size: 12px;
    color: #aaa;
    background: rgba(25,25,25,0.95);
    letter-spacing: 1px;
}

.row {
    display: flex;
    justify-content: space-between;
    padding: 7px 10px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

.rank {
    width: 20px;
    color: #777;
}

.name {
    flex: 1;
    padding-left: 6px;
}

.stats {
    width: 80px;
    text-align: right;
    color: #ddd;
}

/* küçük highlight (1. sıra) */
.row:first-child {
    background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="overlay">
    <div class="header">
        <div style="width:20px;">#</div>
        <div class="name">TEAM</div>
        <div class="stats">PTS / K</div>
    </div>

    <div id="board"></div>
</div>

<script>

// 🎮 SADE PUBG STYLE DATA
let data = [
    {rank:1, name:"ARG", pts:12, kills:4},
    {rank:2, name:"PHI", pts:10, kills:4},
    {rank:3, name:"DEN", pts:9, kills:3},
    {rank:4, name:"USA", pts:7, kills:2},
    {rank:5, name:"INA", pts:5, kills:5},
];

function render() {
    const el = document.getElementById("board");
    el.innerHTML = "";

    data.forEach(t => {
        el.innerHTML += `
        <div class="row">
            <div class="rank">${t.rank}</div>
            <div class="name">${t.name}</div>
            <div class="stats">${t.pts}/${t.kills}</div>
        </div>
        `;
    });
}

render();

// 🔄 demo auto update
setInterval(() => {
    data = data.map(t => ({
        ...t,
        kills: t.kills + (Math.random() > 0.8 ? 1 : 0)
    }));

    render();
}, 3000);

</script>

</body>
</html>
