<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZP PUBG Scrim - Canlı Panel</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0d0d0d;
      color: #fff; 
      margin: 0;
      padding: 0;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 💥 Ana Kapsayıcı: Ekranı Sol ve Sağ olarak ikiye böler */
    .container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* 🔥 SOL TARAF: Anka Kuşu ve MVP Alanı Sabit */
    .left-panel {
      flex: 1;
      max-width: 45%;
      background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.85)), url('https://i.hizliresim.com/d9fo3b9.png') no-repeat center center;
      background-size: cover;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* İçerikleri alt tarafa toplar */
      box-sizing: border-box;
      border-right: 2px solid #3498db;
      position: fixed; /* Ekran kaydırılsa bile burası sabit kalır */
      top: 0;
      left: 0;
      bottom: 0;
    }

    .left-panel h2 {
      font-size: 24px;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* 📊 SAĞ TARAF: Puan Durumu Tablolarının Kaydığı Alan */
    .right-panel {
      flex: 1;
      margin-left: 45%; /* Sol panel sabit olduğu için sağa boşluk verdik */
      padding: 30px;
      background: rgba(10, 10, 10, 0.95);
      box-sizing: border-box;
    }

    h3 { color: #f1c40f; text-transform: uppercase; margin-top: 25px; border-bottom: 2px solid #3498db; padding-bottom: 5px; font-size: 16px; text-align: left; }
    .table-container { width: 100%; overflow-x: auto; margin-bottom: 15px; }
    table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.6); min-width: 450px; }
    th, td { padding: 12px 10px; text-align: center; border: 1px solid #2c3e50; font-size: 14px; }
    th { background: #3498db; color: #fff; text-transform: uppercase; font-size: 12px; }
    tr:nth-child(even) { background: rgba(255,255,255,0.03); }

    /* 🌟 MVP Kutuları Tasarımı (Tam Tasarımdaki Gibi) */
    .mvp-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }
    
    .mvp-section-title {
      font-size: 12px;
      color: #f1c40f;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .mvp-card {
      background: rgba(20, 20, 20, 0.9);
      border: 2px solid #333;
      border-radius: 4px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }

    .mvp-card.player { border-color: #f1c40f; } /* Oyuncu sarı çerçeve */
    .mvp-card.team { border-color: #3498db; }  /* Takım mavi çerçeve */

    .mvp-avatar {
      width: 50px;
      height: 50px;
      background: #111;
      border: 1px solid #441;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .mvp-avatar img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      opacity: 0.6;
    }

    .mvp-info { text-align: left; }
    .mvp-info .name { font-size: 18px; font-weight: bold; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
    .mvp-info .name.player-color { color: #f1c40f; }
    .mvp-info .name.team-color { color: #3498db; }
    .mvp-info .score { font-size: 12px; color: #aaa; margin: 2px 0 0 0; text-transform: uppercase; }

    .btn { display: block; text-align: center; background: #2c3e50; color: #fff; padding: 12px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; font-size: 14px; }

    /* 📱 RESPONSIVE: Telefonlarda düzenin bozulmaması için eski haline döner */
    @media (max-width: 900px) {
      .container { flex-direction: column; }
      .left-panel { position: relative; max-width: 100%; width: 100%; min-height: 400px; justify-content: center; align-items: center; border-right: none; border-bottom: 2px solid #3498db; }
      .right-panel { margin-left: 0; width: 100%; }
    }
  </style>
</head
