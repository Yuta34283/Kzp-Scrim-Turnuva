<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Skor Paneli</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .item { background: white; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <h2>Takım Kill Paneli</h2>
    <div id="controls"></div>

<script>
const initialTeams = [
    {slot:3, tag:"KZP E SPORTS", kills:0}, {slot:4, tag:"KARA E SPORTS", kills:0},
    {slot:5, tag:"ECEL E SPORTS", kills:0}, {slot:6, tag:"EMK E SPORTS", kills:0},
    {slot:7, tag:"PNT E SPORTS", kills:0}, {slot:8, tag:"GOK TEAM", kills:0},
    {slot:9, tag:"KZP ACADEMY", kills:0}, {slot:10, tag:"SVS E SPORTS", kills:0},
    {slot:11, tag:"FLEX E SPORTS", kills:0}, {slot:12, tag:"PNT ACADEMY", kills:0},
    {slot:13, tag:"SFP E SPORTS", kills:0}, {slot:14, tag:"HD E SPORTS", kills:0},
    {slot:15, tag:"ECEL ACADEMY", kills:0}, {slot:16, tag:"KZP AZE", kills:0},
    {slot:17, tag:"PNT PRIME", kills:0}
];

let teams = JSON.parse(localStorage.getItem('teams')) || initialTeams;

function updateKill(index) {
    teams[index].kills += 1;
    localStorage.setItem('teams', JSON.stringify(teams));
    render();
}

function render() {
    const controls = document.getElementById("controls");
    controls.innerHTML = "";
    teams.forEach((t, i) => {
        controls.innerHTML += `
            <div class="item">
                <span><strong>${t.tag}</strong> (${t.kills} Kill)</span>
                <button onclick="updateKill(${i})">+1 Kill</button>
            </div>`;
    });
}
render();
</script>
</body>
</html>
