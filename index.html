<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZP PUBG Scrim Kayıt</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: #111; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #2ecc71; }
        h2 { text-align: center; color: #2ecc71; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>KAYIT FORMU</h2>
    <form id="scrimForm">
        <div class="form-group"><label>Takım Adı:</label><input type="text" id="teamName" required></div>
        <div class="form-group"><label>Kategori:</label><input type="text" id="kategori" required></div>
        <div class="form-group"><label>Instagram:</label><input type="text" id="instagram" placeholder="@kullaniciadi" required></div>
        <div class="form-group"><label>E-posta:</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Oyuncular:</label><textarea id="playerList" rows="4" required></textarea></div>
        <div class="form-group"><label>Dekont:</label><input type="text" id="dekont" required></div>
        <button type="submit" class="btn-submit">KAYDI GÖNDER</button>
    </form>
</div>

<script>
    // Supabase Bağlantısı
    const supabase = supabase.createClient(
        'https://vmipcvmggqlzjnocpoacz.supabase.co', 
        'sb_publishable_fBbKMl-E5Zv-XsssTYCnuw_6j7kh14U'
    );

    document.getElementById('scrimForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const { error } = await supabase.from('kayitlar').insert([{
            isim: document.getElementById('teamName').value,
            kategori: document.getElementById('kategori').value,
            instagram: document.getElementById('instagram').value,
            email: document.getElementById('email').value,
            oyuncular: document.getElementById('playerList').value,
            dekont: document.getElementById('dekont').value
        }]);

        if (error) {
            alert('Hata oluştu: ' + error.message);
        } else {
            alert('✅ Kaydınız başarıyla alındı!');
            window.location.href = "https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X";
        }
    });
</script>

</body>
</html>
