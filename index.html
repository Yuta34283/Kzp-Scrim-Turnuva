<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #080000 url('https://i.hizliresim.com/d9fo3b9.png') no-repeat center center fixed; background-size: cover; color: #fff; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; box-sizing: border-box; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 100%); z-index: -1; }
        .form-container { background: rgba(15, 15, 15, 0.85); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(231, 76, 60, 0.3); border: 1px solid #e74c3c; margin-bottom: 20px; backdrop-filter: blur(6px); }
        h2 { text-align: center; color: #e74c3c; margin-top: 0; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-size: 20px; text-shadow: 0 0 12px rgba(231, 76, 60, 0.6); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #dddddd; font-size: 14px; }
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 12px; border: 1px solid #2c2c2c; background: rgba(8, 8, 8, 0.9); color: #fff; border-radius: 6px; box-sizing: border-box; transition: all 0.3s; font-size: 14px; }
        input:focus, textarea:focus { border-color: #e74c3c; outline: none; box-shadow: 0 0 12px rgba(231, 76, 60, 0.6); background: #000; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #e74c3c 0%, #962d22 100%); border: none; color: #fff; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); letter-spacing: 1px; }
        .error-message { display: none; background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #ff9a9a; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13.5px; font-weight: bold; line-height: 1.4; text-align: center; }
        .social-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .btn-social { display: inline-flex; align-items: center; justify-content: center; color: #fff; text-decoration: none; padding: 12px; font-weight: bold; border-radius: 6px; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; font-size: 14px; margin-bottom: 15px; }
        .btn-full { width: 100%; box-sizing: border-box; }
        .btn-kabul { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); border: 1px solid #2ecc71; display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px; color: white; font-weight: bold; border-radius: 6px; text-decoration: none; }
        .btn-vatangame { background: linear-gradient(135deg, #0056b3 0%, #003366 100%); border: 1px solid #ffcc00; color: #ffcc00; }
        .btn-takvim { background: #1a1a1a; border: 1px solid #f39c12; color: #f39c12; }
        .btn-sorucevap { background: #2c3e50; border: 1px solid #34495e; color: #ffffff; padding: 12px; border-radius: 6px; font-weight: bold; text-decoration: none; text-align: center; }
        .btn-channel { background: #1e272e; border: 1px solid #3d3d3d; }
        .btn-whatsapp { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); border: 1px solid #128C7E; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>KZP Scrim Turnuva Kaydı</h2>
    <a class="btn-social btn-full btn-takvim" href="kurallar.html">⚠️ Kayıt öncesi kuralları okumak için TIKLAYIN!</a>
    <a href="https://vatangame.com/" target="_blank" class="btn-social btn-full btn-vatangame">✌️ Vatan Game Kayıt</a>
    <a href="https://www.instagram.com/channel/AbaVNHociQVJQ7h_/" target="_blank" class="btn-social btn-full btn-channel">📢 Instagram Duyuru Kanalı</a>
    <a href="https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X" target="_blank" class="btn-social btn-full btn-whatsapp">🟢 Resmi WhatsApp Kanalımız</a>
    
    <div id="errorBox" class="error-message"></div>
    <form id="scrimForm" action="https://formspree.io/f/mjgdnqnp" method="POST">
        <input type="hidden" name="_next" value="https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X">
        <div class="form-group"><label>Takım Adı (Tag):</label><input type="text" id="teamName" name="Takım Adı" required placeholder="Örn: KZP"></div>
        <div class="form-group"><label>Kategori:</label><input type="text" name="Kategori" required placeholder="ESPORTS veya ACADEMY"></div>
        <div class="form-group"><label>Kaptan Instagram:</label><input type="text" name="Kaptan Instagram" required></div>
        <div class="form-group"><label>Kaptan E-posta:</label><input type="email" name="_replyto" required></div>
        <div class="form-group"><label>Oyuncular (İsim + ID Şart):</label><textarea id="playerList" name="Oyuncu Listesi" rows="5" required></textarea></div>
        <div class="form-group"><label>Banka Dekont:</label><input type="text" name="Banka Dekont Açıklaması" required></div>
        <button type="submit" class="btn-submit">Kaydı Tamamla ve Gönder</button>
    </form>
</div>

<div class="social-wrapper">
    <a class="btn-kabul" href="kayit.html">✅ KAYIT OLAN TAKIMLAR LİSTESİ</a>
    <a class="btn-social btn-full btn-vatangame" href="guncelpuandurumu.html">📊 Canlı Puan Durumu</a>
    <a class="btn-sorucevap" href="puan.html">📊 Resmi Puanlama Sistemi</a>
    <a class="btn-social btn-full btn-takvim" href="takvim.html">📅 Turnuva & Scrim Takvimi</a>
    <a class="btn-sorucevap" href="sorucevap.html">💬 Canlı Destek & Soru-Cevap</a>
</div>

<script>
    // Supabase Bağlantısı
    const supabase = supabase.createClient(
        'https://vmipcvmggqlzjnocpoacz.supabase.co', 
        'sb_publishable_fBbKMl-E5Zv-XsssTYCnuw_6j7kh14U'
    );

    document.getElementById('scrimForm').addEventListener('submit', async function(e) {
        const teamNameInput = document.getElementById('teamName').value.trim();
        const playerListInput = document.getElementById('playerList').value;
        const errorBox = document.getElementById('errorBox');
        const lines = playerListInput.split('\n').filter(l => l.trim().length > 0);
        
        errorBox.style.display = "none";

        // Kontrol: En az 4 oyuncu
        if (lines.length < 4) {
            e.preventDefault();
            errorBox.innerHTML = "❌ Hata: En az 4 oyuncu girmelisin!";
            errorBox.style.display = "block";
            return;
        }

        // Kontrol: Tag ve ID zorunluluğu
        for (let line of lines) {
            if (!line.toUpperCase().includes(teamNameInput.toUpperCase()) || !/\d+/.test(line)) {
                e.preventDefault();
                errorBox.innerHTML = `❌ Hata: Tüm oyuncuların başında <b>${teamNameInput}</b> tagı olmalı ve yanlarında <b>ID</b> yazmalıdır!`;
                errorBox.style.display = "block";
                return;
            }
        }

        // Supabase Kaydı
        await supabase.from('kayitlar').insert([{
            isim: teamNameInput,
            kategori: document.getElementsByName('Kategori')[0].value,
            instagram: document.getElementsByName('Kaptan Instagram')[0].value,
            email: document.getElementsByName('_replyto')[0].value,
            oyuncular: playerListInput,
            dekont: document.getElementsByName('Banka Dekont Açıklaması')[0].value
        }]);
    });
</script>
</body>
</html>
