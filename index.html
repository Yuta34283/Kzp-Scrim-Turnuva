<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasaklılar Listesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 400px;
            border-top: 5px solid #ff4444;
        }
        h1 {
            text-align: center;
            font-size: 20px;
            color: #ff4444;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #383838;
            margin: 10px 0;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }
        li:hover {
            transform: scale(1.02);
            background: #444;
        }
        li::before {
            content: "🚫";
            margin-right: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PUBG UCLİ ODALARDAKİ YASAKLILAR</h1>
    <ul>
        <!-- İsimleri buraya li etiketleri içinde ekleyebilirsin -->
        <li>Örnek Oyuncu 1</li>
        <li>Örnek Oyuncu 2</li>
    </ul>
</div>

</body>
</html>
