<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yasaklılar Listesi</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Orbitron', sans-serif; /* Daha dijital bir font */
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .banned-card {
            width: 450px;
            background: linear-gradient(145deg, #1a1a1a, #111);
            border: 2px solid #ff0000;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            background-color: #ff0000;
            color: black;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .list-container {
            padding: 20px;
        }
        .banned-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-left: 5px solid #ff0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 5px 5px 0;
        }
        .banned-item span {
            font-size: 18px;
            color: #fff;
        }
        .status {
            color: #ff0000;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="banned-card">
    <div class="header">
        PUBG UCLİ ODALARDAKİ YASAKLILAR
    </div>
    <div class="list-container">
        <!-- İsimleri buraya eklemeye başlayabilirsin -->
        <div class="banned-item">
            <span>BURAYA İSİM GELECEK</span>
            <span class="status">YASAKLI</span>
        </div>
    </div>
</div>

</body>
</html>
