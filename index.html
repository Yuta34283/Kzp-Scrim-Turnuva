<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Katılım Sayfası</title>
</head>
<body>
<h2>Katılım</h2>
<p>Hoşgeldin: <span id="userName"></span></p>
<button id="joinBtn">Katıl</button>
<p>Katılan kişi: <span id="count">0</span> / 100</p>

<script>
const MAX = 100;
const userNameEl = document.getElementById("userName");
const joinBtn = document.getElementById("joinBtn");
const countEl = document.getElementById("count");

const currentName = localStorage.getItem("currentName");
if(!currentName){
  alert("Önce kayıt olun");
  window.location.href = "kayıt.html";
} else {
  userNameEl.innerText = currentName;
}

// Katılanlar
let participants = JSON.parse(localStorage.getItem("participants") || "[]");
countEl.innerText = participants.length;

// Eğer kişi zaten katıldıysa butonu kilitle
if(participants.includes(currentName)){
  joinBtn.disabled = true;
  joinBtn.innerText = "Zaten Katıldın";
}

// Katıl butonu
joinBtn.onclick = () => {
  if(participants.includes(currentName)){
    return alert("Zaten katıldın");
  }
  if(participants.length >= MAX){
    return alert("Katılım doldu");
  }

  participants.push(currentName);
  localStorage.setItem("participants", JSON.stringify(participants));
  joinBtn.disabled = true;
  joinBtn.innerText = "Zaten Katıldın";
  countEl.innerText = participants.length;
  alert("Katılım başarılı");
};

// F8 → Admin Paneli
document.addEventListener("keydown", (e)=>{
  if(e.key === "F8"){
    e.preventDefault();
    const sifre = prompt("Admin Şifresi:");
    if(sifre === "TAHA"){
      window.open("admin.html", "_blank", "width=500,height=600");
    } else {
      alert("Yanlış şifre");
    }
  }
});
</script>
</body>
</html>
