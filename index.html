<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZP PUBG Scrim Turnuva Kaydı</title>
    <link rel="icon" type="image/png" href="https://i.hizliresim.com/6nk32h1.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080000 url('https://i.hizliresim.com/d9fo3b9.png') no-repeat center center fixed; background-size: cover; color: #fff; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .form-container { background: rgba(15, 15, 15, 0.85); padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #e74c3c; box-shadow: 0 0 30px rgba(231, 76, 60, 0.3); }
        h2 { text-align: center; color: #e74c3c; text-transform: uppercase; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #dddddd; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #2c2c2c; background: rgba(8, 8, 8, 0.9); color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 14px; background: #e74c3c; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        .btn-social { display: block; text-align: center; color: #fff; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        .error-message { display: none; background: rgba(231, 76, 60, 0.2); border: 1px solid #e74c3c; color: #ff9a9a; padding: 12px; margin-bottom: 15px; text-align: center; border-radius: 6px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>KZP Scrim Turnuva Kaydı</h2>
    
    <a class="btn-social" style="background:#f39c12" href="kurallar.html">⚠️ Turnuva Kuralları</a>
    <a class="btn-social" style="background:#0056b3" href="vatangame.com">✌️ Vatan Game Kayıt</a>
    <a class="btn-social" style="background:#1e272e" href="https://www.instagram.com/channel/AbaVNHociQVJQ7h_/">📢 Instagram Duyuru Kanalı</a>
    <a class="btn-social" style="background:#25D366" href="https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X">🟢 WhatsApp Kanalımız</a>

    <div id="errorBox" class="error-message"></div>
    
    <form id="scrimForm">
        <div class="form-group"><label>Takım Adı (Tag):</label><input type="text" id="teamName" required placeholder="Örn: KZP"></div>
        <div class="form-group"><label>Kategori (ESPORTS/ACADEMY):</label><input type="text" id="kategori" required></div>
        <div class="form-group"><label>Kaptan Instagram:</label><input type="text" id="instagram" required></div>
        <div class="form-group"><label>Kaptan E-posta:</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Oyuncular (İsim + ID Şart):</label><textarea id="playerList" rows="5" required placeholder="1- İsim (ID)&#10;2- İsim (ID)..."></textarea></div>
        <div class="form-group"><label>Banka Dekont Açıklaması:</label><input type="text" id="dekont" required></div>
        <button type="submit" class="btn-submit">Kaydı Tamamla</button>
    </form>

    <a class="btn-social" style="background:#2ecc71; margin-top:15px;" href="kayit.html">✅ Kayıtlı Takımları Gör</a>
</div>

<script>
    const supabase = supabase.createClient('https://vmipcvmggqlzjnocpoacz.supabase.co', 'sb_publishable_fBbKMl-E5Zv-XsssTYCnuw_6j7kh14U');

    document.getElementById('scrimForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('errorBox');
        const teamName = document.getElementById('teamName').value.trim();
        const playerList = document.getElementById('playerList').value;
        const lines = playerList.split('\n').filter(l => l.trim() !== "");

        // ID ve Tag Kontrolü
        if (lines.length < 4) { errorBox.innerText = "❌ En az 4 oyuncu yazmalısın!"; errorBox.style.display = "block"; return; }
        for (let line of lines) {
            if (!line.includes(teamName) || !/\d+/.test(line)) {
                errorBox.innerHTML = "❌ Hata: Her oyuncu <b>Tag ve ID</b> içermelidir!"; errorBox.style.display = "block"; return;
            }
        }

        // Supabase Gönderim
        const { error } = await supabase.from('kayitlar').insert([{
            isim: teamName, kategori: document.getElementById('kategori').value,
            instagram: document.getElementById('instagram').value, email: document.getElementById('email').value,
            oyuncular: playerList, dekont: document.getElementById('dekont').value
        }]);

        if (error) alert('Hata: ' + error.message);
        else { alert('✅ Kayıt Başarılı!'); window.location.href = "https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X"; }
    });
</script>

</body>
</html>
