        <div class="form-group"><label>Kaptan Instagram:</label><input type="text" name="Kaptan Instagram" required placeholder="@tahaalkanyt"></div>

        <div class="form-group"><label>Oyuncular ve ID:</label><textarea id="playerList" name="Oyuncu Listesi" rows="5" required placeholder="Örn: 1- KZP Yuta (512345678)"></textarea></div>

<script>
    document.getElementById('scrimForm').addEventListener('submit', function(e) {
        const teamNameInput = document.getElementById('teamName').value.trim();
        const playerListInput = document.getElementById('playerList').value;
        const errorBox = document.getElementById('errorBox');
        const lines = playerListInput.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        errorBox.style.display = "none";
        if (lines.length < 4) { e.preventDefault(); errorBox.innerText = "❌ En az 4 oyuncu yazılmalıdır."; errorBox.style.display = "block"; window.scrollTo(0,0); return; }
        for (let line of lines) { if (!line.toUpperCase().includes(teamNameInput.toUpperCase()) || !/\d+/.test(line)) { e.preventDefault(); errorBox.innerText = "❌ Hatalı format: Her oyuncu taglı olmalı ve ID içermeli."; errorBox.style.display = "block"; window.scrollTo(0,0); return; } }
    });
</script>
