<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZP PUBG Scrim Turnuva Kaydı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* BURAYA ESKİ CSS TASARIMIN GELECEK */
        /* Örnek olarak arka planı senin istediğin gibi ayarladım */
        body { 
            background: #080000 url('https://i.hizliresim.com/d9fo3b9.png') no-repeat center center fixed; 
            background-size: cover; 
            /* Diğer eski tasarım kodların buraya... */
        }
    </style>
</head>
<body>

<form id="scrimForm">
    <button type="submit">KAYDI GÖNDER</button>
</form>

<script>
    // Supabase Bağlantısı
    const supabase = supabase.createClient(
        'https://vmipcvmggqlzjnocpoacz.supabase.co', 
        'sb_publishable_fBbKMl-E5Zv-XsssTYCnuw_6j7kh14U'
    );

    document.getElementById('scrimForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Formundaki ID'leri buraya yaz (örn: document.getElementById('teamName').value)
        const { error } = await supabase.from('kayitlar').insert([{
            isim: document.getElementById('teamName').value,
            kategori: document.getElementById('kategori').value,
            instagram: document.getElementById('instagram').value,
            email: document.getElementById('email').value,
            oyuncular: document.getElementById('playerList').value,
            dekont: document.getElementById('dekont').value
        }]);

        if (error) {
            alert('Hata: ' + error.message);
        } else {
            alert('✅ Kayıt başarıyla tamamlandı!');
            window.location.href = "https://whatsapp.com/channel/0029Vb6MwEf8aKvQXZaeSo3X";
        }
    });
</script>

</body>
</html>
